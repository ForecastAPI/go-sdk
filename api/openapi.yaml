      properties:
        identifier:
          description: "Metric identifier (e.g., endpoint name, service name)"
          example: api-endpoint-users
          type: string
        frequency:
          description: |
            Data frequency for forecasting:
            - M: Minute (for real-time traffic)
            - H: Hourly
            - D: Daily
            - W: Weekly
            - MS: Monthly (start of month)
            - ME: Monthly (end of month)
            - Q: Quarterly
            - Y: Yearly
          enum:
          - M
          - H
          - D
          - W
          - MS
          - ME
          - Q
          - "Y"
          example: H
          type: string
        start_date:
          description: Optional start date for the forecast period
          format: date-time
          nullable: true
          type: string
        periods:
          description: Number of periods to forecast ahead
          example: 24
          minimum: 1
          type: integer
        model:
          default: standard
          description: |
            Forecasting model behind the plan. `auto` routes the identifier to whichever
            model has proven most accurate on it, sharing the scorecard built by
            /v2/forecast and /v2/batch/forecast; on this endpoint auto's ensemble default
            runs as `standard` until a winner emerges, and the decision is reported in
            `meta.auto_selection`. Advanced variants, ensemble and auto cost 25% more usage.
          enum:
          - standard
          - advanced
          - advanced-quantized
          - advanced-patched
          - ensemble
          - auto
          type: string
        enable_intelligent_aggregation:
          description: Enable intelligent data aggregation for improved forecasting
          example: true
          type: boolean
        confidence_level:
          description: Confidence level for forecast intervals (default 0.95)
          example: 0.95
          maximum: 0.99
          minimum: 0.1
          type: number
        data:
          description: Historical traffic data for forecasting
          items:
            $ref: "#/components/schemas/TrafficForecastingRequest_data_inner"
          minItems: 1
          type: array
        traffic_settings:
          $ref: "#/components/schemas/TrafficForecastingRequest_traffic_settings"
      required:
      - data
      - frequency
      - identifier
      - periods
      - traffic_settings
      type: object
