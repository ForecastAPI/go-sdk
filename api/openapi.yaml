      properties:
        identifier:
          description: "SKU, Product ID, or other identifier for the inventory item"
          example: SKU-12345
          type: string
        frequency:
          description: |
            Data frequency for forecasting:
            - D: Daily
            - W: Weekly
            - M: Monthly (end of month)
            - MS: Monthly (start of month)
            - ME: Monthly (end of month)
            - Q: Quarterly
            - Y: Yearly
          enum:
