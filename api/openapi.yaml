    GroupedForecastRequest:
      description: |
        Configuration is request-level only: every node of a hierarchy must share `periods`,
        `frequency`, `model` and `confidence`, so per-series overrides are rejected rather
        than silently ignored. The planning parameters (`quantiles`, `value_bounds`,
        `adjustments`, `accumulate`) are not supported on grouped forecasts and are rejected
        explicitly. All series must end on the same date so forecast periods align;
        histories may start whenever they like — a segment that launched later simply
        contributes zero before its first data point. A request may expand to at most 250
        nodes (leaves plus every derived aggregate and the total) across at most 4
        hierarchy levels.
      example:
        identifier: mrr
        correlation: 0.5
        series:
        - data:
          - date: 2024-01-01
            value: 42000
          - date: 2024-01-01
            value: 42000
          segment:
            region: eu
            plan: pro
        - data:
          - date: 2024-01-01
            value: 42000
          - date: 2024-01-01
            value: 42000
          segment:
            region: eu
            plan: pro
        - data:
          - date: 2024-01-01
            value: 42000
          - date: 2024-01-01
            value: 42000
          segment:
            region: eu
            plan: pro
        - data:
          - date: 2024-01-01
            value: 42000
          - date: 2024-01-01
            value: 42000
          segment:
            region: eu
            plan: pro
        - data:
          - date: 2024-01-01
            value: 42000
          - date: 2024-01-01
            value: 42000
          segment:
            region: eu
            plan: pro
        hierarchy:
        - region
        - plan
        confidence: 0.17127370895103003
        confidence_level: 0.6364436002932659
        data_type: revenue
        periods: 6
        model: standard
        reconciliation: bottom_up
        tenant_context: tenant_context
        frequency: M
      properties:
        identifier:
          description: |
            Names the measure being forecast (e.g. "mrr"). The hierarchy's total is stored
            under this identifier exactly like a plain /v2/forecast for it — the total of
            the hierarchy IS the measure.
          example: mrr
          type: string
        tenant_context:
          description: |
            Optional tenant scope, independent of segment — tenancy keeps meaning "whose
            data is this", segment means "which slice".
          nullable: true
          type: string
        hierarchy:
          description: "The dimensions of the hierarchy, outermost first. Each series'\
            \ segment must name exactly these dimensions."
          example:
          - region
          - plan
          items:
            maxLength: 64
            type: string
          maxItems: 4
          minItems: 1
          type: array
        reconciliation:
          default: bottom_up
          description: |
            - bottom_up (default): only the leaves are forecast; every aggregate is the
              exact sum of its children. Fast and cheap; best when leaf histories are
              substantial enough to forecast well on their own.
            - min_trace: every node — aggregates included — is forecast, then MinTrace
              optimally redistributes the disagreement between levels into a coherent set.
              Costs one forecast per node, but lets the usually-smoother aggregate series
              inform the result, which tends to help when leaves are short or noisy.

            top_down is not supported and is rejected by name.
          enum:
          - bottom_up
          - min_trace
          example: bottom_up
          type: string
        correlation:
          default: 0.5
          description: |
            bottom_up only — the assumed correlation between sibling errors when building
            aggregate confidence bands. 0 = independent siblings, 1 = perfectly correlated
            (equivalent to summing the bounds). Echoed back in the response and never
            labelled as measured.
          example: 0.5
          maximum: 1
          minimum: 0
          type: number
        frequency:
          description: "Data frequency, shared by every series in the hierarchy"
          enum:
          - H
          - D
          - W
          - M
          - MS
          - ME
          - Q
          - "Y"
          example: M
          type: string
        periods:
          description: "Number of periods to forecast, shared by every node"
          example: 6
          maximum: 365
          minimum: 1
          type: integer
        data_type:
          default: sales
          description: "Type of data (e.g., sales, demand, revenue). Sales-family\
            \ types get non-negative reconciliation treatment."
          example: revenue
          maxLength: 50
          type: string
        model:
          default: standard
          description: |
            Forecasting engine used for every node. `auto` is not accepted here: it routes
            per series, and a hierarchy is reconciled under one model.
          enum:
          - standard
          - advanced
          - advanced-quantized
          - advanced-patched
          - ensemble
          type: string
        confidence:
          default: 0.8
          description: "Confidence level for prediction intervals, shared by every\
            \ node"
          maximum: 0.99
          minimum: 0.1
          type: number
        confidence_level:
          description: "Alias for `confidence`; if both are sent, `confidence` wins"
          maximum: 0.99
          minimum: 0.1
          type: number
        series:
          description: |
            The leaves of the hierarchy — one entry per combination of dimension values,
            each combination exactly once. Up to 200 series on a paid plan, 10 on the free
            tier. Aggregate levels are derived by the API and must not be sent.
          items:
            $ref: "#/components/schemas/GroupedForecastSeries"
          maxItems: 200
          minItems: 2
          type: array
      required:
      - frequency
      - hierarchy
      - identifier
      - periods
      - series
      type: object
    GroupedForecastSeries:
      example:
        data:
        - date: 2024-01-01
          value: 42000
        - date: 2024-01-01
          value: 42000
        segment:
          region: eu
          plan: pro
      properties:
        segment:
          additionalProperties: true
          description: |
            Names exactly the declared hierarchy dimensions — no more, no fewer. Values are
