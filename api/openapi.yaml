            Forecasting model behind the plan. `auto` routes the identifier to whichever
            model has proven most accurate on it, sharing the scorecard built by
            /v2/forecast and /v2/batch/forecast; on this endpoint auto's ensemble default
            runs as `standard` until a winner emerges, and the decision is reported in
            `meta.auto_selection`. Advanced variants, ensemble and auto cost 25% more usage.
          enum:
          - standard
          - advanced
          - advanced-quantized
          - advanced-patched
          - ensemble
          - auto
